name: fresta_flutter
description: Fresta B2C mobile app (Flutter MVP).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.3
  go_router: ^16.0.0
  supabase_flutter: ^2.10.0
  flutter_dotenv: ^6.0.0
  google_sign_in: ^6.2.1
  share_plus: ^12.0.1
  app_links: ^6.4.1
  url_launcher: ^6.3.2
  lucide_icons_flutter: ^3.1.10
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  flutter_local_notifications: ^21.0.0-dev.2
  timezone: ^0.11.0
  google_fonts: ^8.0.2
  image_picker: ^1.2.1
  purchases_flutter: ^9.12.3
  purchases_ui_flutter: ^9.12.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/fresta_icon_final_concept_1_flat_1772239935761.png"
  adaptive_icon_background: "#0F1A16"
  adaptive_icon_foreground: "assets/images/fresta_icon_final_concept_1_flat_1772239935761.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0F1A16"
  image: "assets/images/fresta_splash_screen_concept_1_1772239948416.png"
  android_12:
    color: "#0F1A16"
    image: "assets/images/fresta_icon_final_concept_1_flat_1772239935761.png"
  ios: true
  android: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/themes/
    - assets/images/
